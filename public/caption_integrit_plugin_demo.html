
<style>
*{box-sizing:border-box;margin:0;padding:0}
@keyframes scanline{0%{left:-4px}100%{left:calc(100% + 4px)}}
@keyframes wavepulse{0%,100%{opacity:.4;transform:scaleY(1)}50%{opacity:1;transform:scaleY(1.5)}}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes progress{from{width:0%}to{width:100%}}
@keyframes captionpop{0%{opacity:0;transform:scale(.96) translateY(4px)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes pulse-ring{0%{opacity:.5;transform:scale(1)}100%{opacity:0;transform:scale(1.6)}}

.plugin-window {
  background: #1a1a1c;
  border-radius: 12px;
  overflow: hidden;
  font-family: 'SF Mono', Consolas, monospace;
  border: 1px solid #333;
  width: 100%;
  max-width: 100%;
}
.window-header {
  background: #252528;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  border-bottom: 1px solid #333;
}
.demo-container {
  display: flex;
  height: 420px;
}
.left-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  border-right: 1px solid #333;
  min-width: 0;
}
.right-panel {
  width: 220px;
  background: #1e1e22;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

@media (max-width: 640px) {
  .demo-container {
    flex-direction: column;
    height: auto;
  }
  .left-panel {
    border-right: none;
    border-bottom: 1px solid #333;
    height: 300px;
  }
  .right-panel {
    width: 100%;
    flex-shrink: 1;
  }
}
</style>

<div class="plugin-window">

  <div class="window-header">
    <div style="width:10px;height:10px;border-radius:50%;background:#e05252"></div>
    <div style="width:10px;height:10px;border-radius:50%;background:#e0a052"></div>
    <div style="width:10px;height:10px;border-radius:50%;background:#52c452"></div>
    <span style="margin-left:8px;font-size:12px;color:#888;font-family:sans-serif">Caption Integrit — Adobe After Effects</span>
    <div style="margin-left:auto;display:flex;gap:6px">
      <span style="font-size:11px;color:#abed6c;background:#2a3a1a;padding:2px 8px;border-radius:4px;font-family:sans-serif">Plugin active</span>
    </div>
  </div>

  <div class="demo-container">

    <div class="left-panel">

      <div style="flex:1;background:#111;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden">
        <div style="width:240px;height:135px;background:#1e1e22;border:1px solid #444;border-radius:4px;position:relative;overflow:hidden">
          <div style="background:#0a0a0c;width:100%;height:100%;display:flex;align-items:center;justify-content:center">
            <svg width="80" height="50" viewBox="0 0 80 50" style="opacity:.4">
              <rect x="10" y="14" width="60" height="34" rx="3" fill="none" stroke="#666" stroke-width="1"/>
              <polygon points="30,22 30,42 54,32" fill="#666"/>
            </svg>
          </div>
          <div id="caption-overlay" style="position:absolute;bottom:12px;left:50%;transform:translateX(-50%);white-space:nowrap;font-family:sans-serif;font-size:13px;font-weight:600;color:#fff;text-shadow:0 1px 4px #000;letter-spacing:.3px;opacity:0;transition:opacity .3s"></div>
        </div>
      </div>

      <div style="background:#1a1a1c;padding:10px 14px;border-top:1px solid #333">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <span style="font-size:10px;color:#666;font-family:sans-serif">AUDIO WAVEFORM</span>
          <div id="scan-bar" style="display:none;position:relative;height:2px;flex:1;background:#333;border-radius:1px;overflow:hidden">
            <div id="scan-progress" style="height:100%;background:#abed6c;width:0%;transition:width .05s linear"></div>
          </div>
        </div>
        <div style="display:flex;gap:2px;align-items:center;height:36px" id="wave-bars">
        </div>
      </div>

      <div style="background:#161618;padding:8px 14px;border-top:1px solid #2a2a2a">
        <div style="display:flex;gap:3px;align-items:flex-end;height:24px" id="timeline-track">
        </div>
        <div style="margin-top:6px;display:flex;gap:10px">
          <div style="height:8px;border-radius:2px;background:#2c4a8c;flex:2"></div>
          <div style="height:8px;border-radius:2px;background:#6b3a7a;flex:3"></div>
          <div style="height:8px;border-radius:2px;background:#3a5a3a;flex:2"></div>
        </div>
      </div>
    </div>

    <div class="right-panel">

      <div style="padding:12px 14px;border-bottom:1px solid #333">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px">
          <div style="width:8px;height:8px;border-radius:50%;background:#abed6c;position:relative">
            <div style="position:absolute;inset:-3px;border-radius:50%;border:1.5px solid #abed6c;animation:pulse-ring 1.4s ease-out infinite"></div>
          </div>
          <span style="font-size:12px;font-weight:600;color:#e8e8e8;font-family:sans-serif">Caption Integrit</span>
        </div>

        <div style="margin-bottom:8px">
          <div style="font-size:10px;color:#666;font-family:sans-serif;margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em">Output language</div>
          <div style="display:flex;flex-wrap:wrap;gap:4px" id="lang-btns">
          </div>
        </div>
      </div>

      <div style="padding:12px 14px;border-bottom:1px solid #333;flex:1;overflow:hidden">
        <div style="font-size:10px;color:#666;font-family:sans-serif;margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em">Caption output</div>
        <div id="caption-log" style="display:flex;flex-direction:column;gap:6px"></div>
      </div>

      <div style="padding:10px 14px">
        <button id="run-btn" onclick="runDemo()" style="width:100%;background:#abed6c;border:none;border-radius:6px;padding:8px;font-size:13px;font-weight:600;color:#0f1f00;cursor:pointer;font-family:sans-serif;transition:opacity .2s">
          Run Caption Integrit
        </button>
        <div id="status-text" style="font-size:11px;color:#666;font-family:sans-serif;text-align:center;margin-top:6px;min-height:16px"></div>
      </div>
    </div>
  </div>
</div>

<script>
const langs = [
  {id:'te', label:'Telugu', captions:['నమస్తే అందరికీ','ఈ వీడియోలో','మీకు చూపిస్తాను','ధన్యవాదాలు']},
  {id:'hi', label:'Hindi', captions:['नमस्ते दोस्तों','इस वीडियो में','आपको दिखाता हूँ','धन्यवाद']},
  {id:'ml', label:'Malayalam', captions:['നമസ്കാരം','ഈ വീഡിയോയിൽ','നിങ്ങൾക്ക് കാണിക്കും','നന്ദി']},
  {id:'ta', label:'Tamil', captions:['வணக்கம் நண்பர்களே','இந்த வீடியோவில்','உங்களுக்கு காட்டுகிறேன்','நன்றி']},
  {id:'teng', label:'Tenglish', captions:['Andaru ki namaste','Ee video lo','meeku chupistanu','Thanks ra']},
  {id:'hing', label:'Hinglish', captions:['Kya haal hai sab','Is video mein','aapko dikhaunga','Thanks yaar']},
  {id:'en', label:'English', captions:['Hello everyone','In this video','I will show you','Thank you']},
];

let activeLang = 'teng';
let running = false;
let scanTimer = null;

const waveBars = document.getElementById('wave-bars');
const timelineTrack = document.getElementById('timeline-track');
const langBtnsEl = document.getElementById('lang-btns');
const captionLog = document.getElementById('caption-log');
const statusText = document.getElementById('status-text');
const captionOverlay = document.getElementById('caption-overlay');
const scanProgress = document.getElementById('scan-progress');
const scanBar = document.getElementById('scan-bar');
const runBtn = document.getElementById('run-btn');

const waveHeights = [6,10,16,22,28,32,24,18,30,26,20,14,8,18,28,34,26,20,12,24,30,22,16,10,20,28,24,18,12,8];
waveHeights.forEach((h,i)=>{
  const b = document.createElement('div');
  b.style.cssText = `width:6px;height:${h}px;background:#3a5a8a;border-radius:1px;animation:wavepulse ${(.8+Math.random()*.8).toFixed(2)}s ease-in-out ${(i*.04).toFixed(2)}s infinite;flex-shrink:0`;
  waveBars.appendChild(b);
});

for(let i=0;i<40;i++){
  const s = document.createElement('div');
  const h = 4+Math.floor(Math.random()*20);
  s.style.cssText = `width:4px;height:${h}px;background:#2a3a4a;border-radius:1px;flex-shrink:0`;
  timelineTrack.appendChild(s);
}

langs.forEach(l=>{
  const btn = document.createElement('button');
  btn.id = 'btn-'+l.id;
  btn.textContent = l.label;
  btn.onclick = ()=>{ activeLang=l.id; updateLangBtns(); };
  btn.style.cssText = 'font-size:10px;padding:3px 7px;border-radius:4px;border:1px solid #444;background:transparent;color:#aaa;cursor:pointer;font-family:sans-serif;transition:all .15s';
  langBtnsEl.appendChild(btn);
});
updateLangBtns();

function updateLangBtns(){
  langs.forEach(l=>{
    const btn = document.getElementById('btn-'+l.id);
    if(btn){
      btn.style.background = l.id===activeLang ? '#abed6c' : 'transparent';
      btn.style.color = l.id===activeLang ? '#0f1f00' : '#aaa';
      btn.style.borderColor = l.id===activeLang ? '#abed6c' : '#444';
      btn.style.fontWeight = l.id===activeLang ? '600' : '400';
    }
  });
}

function runDemo(){
  if(running) return;
  running = true;
  runBtn.style.opacity = '.5';
  runBtn.textContent = 'Processing...';
  captionLog.innerHTML = '';
  captionOverlay.style.opacity = '0';

  const lang = langs.find(l=>l.id===activeLang);
  statusText.textContent = 'Reading audio track...';
  scanBar.style.display = 'flex';
  scanProgress.style.width = '0%';

  Array.from(waveBars.children).forEach(b=>{
    b.style.background = '#4a6a2a';
  });

  let pct = 0;
  const scanInterval = setInterval(()=>{
    pct += 2;
    scanProgress.style.width = pct+'%';
    const idx = Math.floor(pct/100 * waveBars.children.length);
    for(let i=0;i<idx;i++){
      waveBars.children[i].style.background = '#abed6c';
    }
    if(pct>=100){
      clearInterval(scanInterval);
      statusText.textContent = 'Generating captions...';
      showCaptions(lang);
    }
  }, 40);
}

function showCaptions(lang){
  let i = 0;
  const times = ['00:00:02','00:00:05','00:00:09','00:00:14'];
  function next(){
    if(i >= lang.captions.length){
      statusText.textContent = lang.captions.length + ' captions exported';
      captionOverlay.style.opacity = '0';
      runBtn.style.opacity = '1';
      runBtn.textContent = 'Run Caption Integrit';
      running = false;
      return;
    }
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;gap:8px;align-items:flex-start;animation:captionpop .3s ease forwards;opacity:0;background:#252528;border-radius:6px;padding:6px 8px';
    row.innerHTML = `<span style="font-size:10px;color:#abed6c;font-family:monospace;flex-shrink:0;margin-top:1px">${times[i]}</span><span style="font-size:12px;color:#e8e8e8;font-family:sans-serif;line-height:1.4">${lang.captions[i]}</span>`;
    captionLog.appendChild(row);
    captionOverlay.textContent = lang.captions[i];
    captionOverlay.style.opacity = '1';
    i++;
    setTimeout(next, 900);
  }
  setTimeout(next, 300);
}

statusText.textContent = 'Select language & press run';
</script>
